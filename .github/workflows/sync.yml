name: Sync Upstream
on:
  schedule:
    - cron: "0 * * * *" # Runs hourly
  workflow_dispatch: # Allows manual trigger

jobs:
  sync:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout target repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.PERSONAL_ACCESS_TOKEN }}

      - name: Merge Upstream
        run: |
          git config user.name "GitHub Action"
          git config user.email "action@github.com"
          git remote add upstream https://github.com/pixincreate/PixeneOS.git
          git fetch upstream

          # Try to merge.
          git merge upstream/main --allow-unrelated-histories -m "Auto-sync" || \
          (
            # Remove from index (staging)
            git rm --cached -f .github/workflows/renovate.yml || true
            git rm --cached -f renovate.json5 || true
            git rm --cached -f .github/renovate.json5 || true
            
            # Remove from physical disk
            rm -f .github/workflows/renovate.yml renovate.json5 .github/renovate.json5
            
            # Finalize the merge commit
            git add .
            git commit -m "Auto-resolve renovate conflict by removing upstream renovate files"
          )

          git push origin main
