name: Sync Upstream
on:
  schedule:
    - cron: "0 * * * *" # Runs hourly
  workflow_dispatch: # Allows manual trigger

jobs:
  sync:
    runs-on: ubuntu-latest
    permissions:
      contents: write # To push commits
      workflows: write # To update/sync workflow files
    steps:
      - name: Checkout target repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Merge Upstream
        run: |
          git config user.name "GitHub Action"
          git config user.email "action@github.com"
          git remote add upstream https://github.com/pixincreate/PixeneOS.git
          git fetch upstream

          # Try to merge.
          git merge upstream/main --allow-unrelated-histories -m "Auto-sync" || \
          (
            # Manually resolve the modify/delete conflict by removing the files from the index
            git rm --cached -f .github/workflows/renovate.yml || true
            git rm --cached -f renovate.json5 || true
            
            # Remove them from the working directory if they were recreated
            rm -f .github/workflows/renovate.yml .github/renovate.json5
            
            # Finalize the merge commit
            git add .
            git commit -m "Auto-resolve renovate conflict by removing upstream renovate files"
          )

          git push origin main
